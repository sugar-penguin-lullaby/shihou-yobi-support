<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予備試験 短答式過去問 サポート</title>
  <meta name="description" content="iOSアプリ『予備試験 短答式過去問』のサポートページです。">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #0f766e;
      --border: #dbe3ef;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #111a2c;
        --text: #e5ecf7;
        --muted: #b8c2d3;
        --accent: #5eead4;
        --border: #1f2a44;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg), #dce8ff 120%);
      color: var(--text);
      line-height: 1.7;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 4vw, 2rem);
      line-height: 1.3;
    }
    h2 {
      margin: 24px 0 8px;
      font-size: 1.1rem;
    }
    p, li { color: var(--muted); }
    ul {
      margin: 8px 0 0;
      padding-left: 1.2rem;
    }
    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
    }
    footer {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    code {
      background: rgba(127, 127, 127, 0.15);
      padding: 0.1em 0.4em;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <span class="badge">iOSアプリ サポートサイト</span>
      <h1>予備試験 短答式過去問</h1>
      <p>
        司法試験予備試験の短答式過去問をスマホで演習できる iPhone アプリです。
        平成28年〜令和7年の10年分を収録しています。
      </p>

      <h2>主な機能</h2>
      <ul>
        <li>年度別・科目別演習</li>
        <li>詳細解説、復習、ブックマーク</li>
        <li>ランダム出題、学習統計</li>
        <li>フォントサイズ調整、ダークモード</li>
        <li>完全オフライン対応</li>
        <li>一部無料、買い切り課金あり</li>
      </ul>

      <h2>AdMob 向け情報</h2>
      <p>
        本サイトは AdMob の <code>app-ads.txt</code> 対応のために公開しています。
      </p>

      <footer>
        &copy; 2026 Nakano Yuichiro
      </footer>
    </section>
  </main>
</body>
</html>
